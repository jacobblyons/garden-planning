<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Harvest cues — Bothell Garden Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root{
    --paper:#f4f1ea;
    --paper-2:#ece7d9;
    --ink:#1f2a20;
    --ink-2:#3a443a;
    --rule:#cfc7b3;
    --green:#4a5d3a;
    --green-2:#6d8554;
    --green-3:#8ea872;
    --soil:#7a5a38;
    --tomato:oklch(0.62 0.14 28);
    --ochre:oklch(0.74 0.12 80);
    --sky:oklch(0.68 0.08 230);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:"Fraunces",Georgia,serif;font-optical-sizing:auto}
  body{
    background-image:
      linear-gradient(var(--paper),var(--paper)),
      radial-gradient(circle at 20% 10%, rgba(0,0,0,0.04), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(0,0,0,0.04), transparent 45%);
    background-blend-mode:multiply;
    padding:56px 48px 80px;
    min-height:100vh;
  }
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;letter-spacing:0.02em}
  .wrap{max-width:1360px;margin:0 auto}

  /* Masthead */
  header.masthead{
    display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end;
    border-bottom:1px solid var(--ink);padding-bottom:20px;margin-bottom:28px;
  }
  .eyebrow{font-family:"JetBrains Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.22em;color:var(--ink-2)}
  h1{font-family:"Fraunces",serif;font-weight:500;font-size:54px;line-height:0.95;margin:10px 0 0;letter-spacing:-0.02em}
  h1 em{font-style:italic;color:var(--green)}
  .meta{font-family:"JetBrains Mono",monospace;font-size:11px;line-height:1.6;color:var(--ink-2);text-align:right;text-transform:uppercase;letter-spacing:0.12em}
  .meta b{color:var(--ink);font-weight:600}

  /* Section head */
  .section-head{display:flex;align-items:baseline;gap:16px;margin:44px 0 18px;border-bottom:1px dashed var(--rule);padding-bottom:10px}
  .section-head .num{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--green);letter-spacing:0.18em}
  .section-head h2{font-family:"Fraunces",serif;font-weight:500;font-size:28px;margin:0;letter-spacing:-0.01em}
  .section-head .tag{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-2);text-transform:uppercase;letter-spacing:0.18em}

  /* Intro grid */
  .intro{
    display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:28px;align-items:start;
  }
  .intro p{font-size:16px;line-height:1.55;margin:0 0 10px;color:var(--ink-2);max-width:56ch}
  .intro p b{color:var(--ink)}
  .stat{border-top:1px solid var(--ink);padding-top:10px}
  .stat .k{font-family:"JetBrains Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:var(--ink-2)}
  .stat .v{font-family:"Fraunces",serif;font-size:24px;margin-top:4px}
  .stat .v em{font-style:italic;color:var(--green)}

  /* Legend */
  .legend{
    display:grid;grid-template-columns:repeat(auto-fill, minmax(180px,1fr));gap:14px 28px;
    padding:18px 22px;background:var(--paper-2);border:1px solid var(--rule);
  }
  .legend .item{display:flex;align-items:center;gap:10px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink);letter-spacing:0.04em}
  .swatch{width:16px;height:16px;border:1px solid var(--ink);flex:none;display:inline-block}

  /* Layouts */
  .layout{
    margin-top:22px;
    display:grid;grid-template-columns:1fr 340px;gap:40px;
    align-items:start;
  }
  .layout-title{display:flex;align-items:baseline;gap:14px;margin-bottom:8px}
  .layout-title .idx{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--green);letter-spacing:0.2em}
  .layout-title h3{font-family:"Fraunces",serif;font-weight:500;font-size:32px;margin:0;letter-spacing:-0.01em}
  .layout-title h3 em{font-style:italic;color:var(--green)}
  .layout-sub{font-size:15px;color:var(--ink-2);max-width:62ch;line-height:1.5;margin:0 0 16px}

  .beds{
    display:flex;flex-direction:column;gap:30px;
  }
  .bed{
    position:relative;
  }
  .bed .label{
    display:flex;align-items:baseline;gap:10px;margin-bottom:8px;
    font-family:"JetBrains Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:0.16em;color:var(--ink-2);
  }
  .bed .label b{color:var(--ink);font-weight:600}
  .bed .label .dim{margin-left:auto;color:var(--green)}

  /* SVG bed styling handled inline; shared defaults */
  svg.bed-svg{display:block;width:100%;height:auto;background:#ece6d1;border:1px solid var(--ink)}
  .cell-line{stroke:#c8bfa5;stroke-width:0.5}
  .plot-border{fill:none;stroke:var(--ink);stroke-width:1.5}
  .plant-dot{stroke:var(--ink);stroke-width:0.6}
  .plant-label{font-family:"JetBrains Mono",monospace;font-size:7px;fill:var(--ink);letter-spacing:0.04em;text-anchor:middle;paint-order:stroke;stroke:#ece6d1;stroke-width:2.5px;stroke-linejoin:round}
  .plant-label-lg{font-family:"JetBrains Mono",monospace;font-size:9px;fill:var(--ink);letter-spacing:0.04em;text-anchor:middle;paint-order:stroke;stroke:#ece6d1;stroke-width:3px;stroke-linejoin:round}
  .zone-fill{fill-opacity:0.18;stroke-dasharray:2 2;stroke-width:0.6}
  .ruler{font-family:"JetBrains Mono",monospace;font-size:6px;fill:var(--ink-2);letter-spacing:0.08em}
  .trellis{stroke:var(--soil);stroke-width:0.8;fill:none;stroke-dasharray:0.6 0.6}
  .compass{font-family:"JetBrains Mono",monospace;font-size:7px;fill:var(--ink-2);letter-spacing:0.14em;text-anchor:middle}

  /* Notes column */
  .notes{
    border-left:1px solid var(--rule);padding-left:26px;
  }
  .notes h4{font-family:"Fraunces",serif;font-weight:500;font-size:18px;margin:0 0 10px;letter-spacing:-0.005em}
  .notes .sub{font-family:"JetBrains Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.18em;color:var(--green);margin-bottom:4px}
  .notes ul{list-style:none;padding:0;margin:0 0 18px}
  .notes li{font-size:13.5px;line-height:1.5;color:var(--ink-2);padding:6px 0;border-bottom:1px dotted var(--rule);display:grid;grid-template-columns:72px 1fr;gap:10px}
  .notes li b{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--ink);text-transform:uppercase;letter-spacing:0.08em;padding-top:2px}
  .notes li em{font-style:italic;color:var(--green)}

  /* Calendar strip */
  .calendar{
    margin-top:14px;border:1px solid var(--rule);background:var(--paper-2);
    padding:14px 18px;
  }
  .calendar h5{margin:0 0 10px;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink)}
  .cal-grid{display:grid;grid-template-columns:90px repeat(8,1fr);gap:2px 6px;font-family:"JetBrains Mono",monospace;font-size:9.5px;color:var(--ink-2);align-items:center}
  .cal-grid .m{text-align:center;color:var(--ink);font-weight:500;letter-spacing:0.1em;padding-bottom:4px;border-bottom:1px solid var(--rule)}
  .cal-grid .row-label{text-align:right;padding-right:6px;color:var(--ink);font-weight:500;letter-spacing:0.04em}
  .cal-grid .bar{height:10px;background:var(--green-3);position:relative}
  .cal-grid .bar.g2{background:var(--green-2)}
  .cal-grid .bar.g3{background:var(--green)}
  .cal-grid .bar.h{background:var(--ochre)}
  .cal-grid .bar.t{background:var(--tomato)}
  .cal-grid .empty{height:10px}

  /* Footer */
  footer{
    margin-top:60px;padding-top:20px;border-top:1px solid var(--ink);
    display:flex;justify-content:space-between;font-family:"JetBrains Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.18em;color:var(--ink-2)
  }

  @media (max-width: 980px){
    .intro{grid-template-columns:1fr}
    .layout{grid-template-columns:1fr}
    .notes{border-left:0;border-top:1px solid var(--rule);padding-left:0;padding-top:20px}
  }

  /* Page chrome for per-bed pages */
  .bed-page{padding:0;margin:40px 0 0}
  .bed-page-body{display:grid;grid-template-columns:1.4fr 1fr;gap:36px;align-items:start;margin-top:14px}
  .bed-page-body .bp-diagram{}
  .bed-page-body .bp-diagram svg{width:100%;height:auto}
  .bed-page-body .bp-aside{border-left:1px solid var(--rule);padding-left:26px}
  .bed-page-body .bp-aside h4{font-family:"Fraunces",serif;font-weight:500;font-size:18px;margin:0 0 8px;letter-spacing:-0.005em}
  .bed-page-body .bp-aside .sub{font-family:"JetBrains Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.18em;color:var(--green);margin:18px 0 4px}
  .bed-page-body .bp-aside .sub:first-child{margin-top:0}
  .bed-page-body .bp-aside p{font-size:13.5px;line-height:1.55;color:var(--ink-2);margin:0 0 10px}
  .bed-page-body .bp-aside p b{color:var(--ink)}
  .bed-page-body .bp-aside p em{font-style:italic;color:var(--green)}
  .bed-page-body .bp-aside ul{list-style:none;padding:0;margin:0 0 6px}
  .bed-page-body .bp-aside li{font-size:13px;line-height:1.5;color:var(--ink-2);padding:5px 0;border-bottom:1px dotted var(--rule);display:grid;grid-template-columns:78px 1fr;gap:10px}
  .bed-page-body .bp-aside li b{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--ink);text-transform:uppercase;letter-spacing:0.08em;padding-top:2px}

  /* Wide tables (succession + companions) — placed below diagram */
  .bp-wide{grid-column:1 / -1;margin-top:30px}
  .bp-wide h3{font-family:"Fraunces",serif;font-weight:500;font-size:22px;margin:0 0 12px;letter-spacing:-0.005em;border-bottom:1px dashed var(--rule);padding-bottom:6px}
  .bp-wide h3 .hnum{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--green);letter-spacing:0.2em;margin-right:12px;vertical-align:1px}

  /* Succession calendar — slot-based timeline.
     Each "row" is a bed slot; sequential crops occupy that slot in sequence,
     with a ▶ handoff arrow between them. This makes replacement explicit. */
  .succ{
    border:1px solid var(--rule);padding:14px 16px 16px;background:var(--paper-2)
  }
  .succ-legend{display:flex;flex-wrap:wrap;gap:18px;font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:0.08em;color:var(--ink-2);padding-bottom:10px;margin-bottom:8px;border-bottom:1px dashed var(--rule)}
  .succ-legend b{font-family:"Fraunces",serif;font-style:italic;font-weight:500;font-size:11px;color:var(--ink);margin-right:4px;letter-spacing:0}
  .succ-legend .lg-arrow{color:var(--ink);font-weight:700;margin-right:4px}
  .succ-legend .lg-dash{display:inline-block;width:22px;height:0;border-top:1px dashed var(--ink);vertical-align:middle;margin-right:6px;transform:translateY(-2px)}
  .succ-legend .lg-stack{display:inline-block;width:18px;height:10px;background:linear-gradient(to bottom,var(--green) 50%,var(--green-2) 50%);vertical-align:middle;margin-right:6px;transform:translateY(-1px)}
  .succ-head{display:grid;grid-template-columns:170px repeat(9,1fr) 12px;font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--ink);letter-spacing:0.14em;border-bottom:1px solid var(--ink);padding-bottom:6px;margin-bottom:10px}
  .succ-head .sh{text-align:center}
  .succ-head .sh.first{text-align:left;font-style:normal;letter-spacing:0.16em}
  .succ-row{display:grid;grid-template-columns:170px 1fr;gap:0 12px;padding:6px 0;border-bottom:1px dotted var(--rule);align-items:center}
  .succ-row:last-child{border-bottom:none}
  .succ-slot{font-family:"Fraunces",serif;font-style:italic;font-size:13px;color:var(--ink);line-height:1.25;padding-right:10px;border-right:1px solid var(--rule)}
  .succ-slot .tag{display:block;font-family:"JetBrains Mono",monospace;font-style:normal;font-size:8.5px;letter-spacing:0.14em;color:var(--ink-2);margin-top:2px;text-transform:uppercase}
  .succ-track{position:relative;height:30px}
  .succ-track.two-lane{height:42px}
  .succ-track .grid{position:absolute;inset:0;display:grid;grid-template-columns:repeat(9,1fr);pointer-events:none}
  .succ-track .grid > span{border-left:1px dashed rgba(31,42,32,0.12)}
  .succ-track .grid > span:first-child{border-left:none}
  .succ-bar{position:absolute;top:8px;height:14px;border-radius:1px;display:flex;align-items:center;padding:0 6px;font-family:"JetBrains Mono",monospace;font-size:8.5px;color:#fff;letter-spacing:0.08em;font-weight:600;white-space:nowrap;overflow:hidden}
  .succ-bar.c-tom{background:var(--tomato)}
  .succ-bar.c-och{background:var(--ochre);color:#1f2a20}
  .succ-bar.c-g1{background:#556b44}
  .succ-bar.c-g2{background:var(--green)}
  .succ-bar.c-g3{background:var(--green-2);color:#1f2a20}
  .succ-bar.c-g4{background:var(--green-3);color:#1f2a20}
  /* Peak-window overlay — bright sub-band marking "PICK NOW" */
  .succ-bar.has-peak{opacity:0.35}
  .succ-peak{position:absolute;height:14px;border-radius:1px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-family:"JetBrains Mono",monospace;font-size:8px;letter-spacing:0.16em;color:#1f2a20;background:#f2c94c;border:1px solid #1f2a20;text-transform:uppercase;font-weight:700;pointer-events:none;text-wrap:nowrap;overflow:hidden}
  .succ-peak.with-dot::before{content:"◆ ";font-size:7px;margin-right:3px;opacity:0.8}
  .succ-bar .lend{margin-left:auto;opacity:0.75;font-size:8px;padding-left:6px}
  .succ-arrow{position:absolute;top:12px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink);font-weight:700;transform:translateX(-50%);pointer-events:none}
  .succ-gap{position:absolute;height:14px;border-top:1px dashed rgba(31,42,32,0.45);border-bottom:1px dashed rgba(31,42,32,0.45);display:flex;align-items:center;justify-content:center;font-family:"JetBrains Mono",monospace;font-size:7.5px;letter-spacing:0.1em;color:var(--ink-2);text-transform:uppercase;pointer-events:none}
  /* compact month label strip inside the track */
  .succ-months{position:absolute;left:0;right:0;bottom:-2px;display:grid;grid-template-columns:repeat(9,1fr);font-family:"JetBrains Mono",monospace;font-size:7.5px;color:var(--ink-2);letter-spacing:0.1em}
  .succ-months span{text-align:center;opacity:0}

  /* Companion table */
  .comp-tbl{width:100%;border-collapse:collapse;font-size:13px;color:var(--ink-2);border-top:1px solid var(--ink);border-bottom:1px solid var(--ink)}
  .comp-tbl th{font-family:"JetBrains Mono",monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:0.16em;color:var(--ink);text-align:left;padding:10px 10px 8px;border-bottom:1px solid var(--ink);background:var(--paper-2)}
  .comp-tbl td{padding:10px;border-bottom:1px dotted var(--rule);vertical-align:top;line-height:1.5}
  .comp-tbl td.crop{font-family:"Fraunces",serif;font-size:15px;font-style:italic;color:var(--ink);width:140px}
  .comp-tbl td.good{color:var(--green)}
  .comp-tbl td.bad{color:#8b4032}
  .comp-tbl td.sp{font-family:"JetBrains Mono",monospace;font-size:11px;width:90px}

  /* Shopping list */
  .shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:14px}
  .shop-col{border:1px solid var(--rule);padding:14px 16px;background:var(--paper-2)}
  .shop-col h3{font-family:"Fraunces",serif;font-weight:500;font-size:17px;margin:0 0 2px;letter-spacing:-0.005em;color:var(--ink)}
  .shop-col h3 em{font-style:italic;color:var(--green)}
  .shop-col .when{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--green);margin:0 0 10px;display:block}
  .shop-col ul{list-style:none;padding:0;margin:0 0 8px}
  .shop-col li{display:grid;grid-template-columns:14px 1fr 48px;gap:7px;align-items:baseline;padding:3px 0;border-bottom:1px dotted var(--rule);font-size:11.5px;color:var(--ink);line-height:1.3}
  .shop-col li:last-child{border-bottom:none}
  .shop-col .cb{width:9px;height:9px;border:1px solid var(--ink);display:inline-block;margin-top:3px}
  .shop-col .name{color:var(--ink)}
  .shop-col .name b{font-weight:600}
  .shop-col .name em{font-style:italic;color:var(--ink-2);font-size:10px;display:inline;margin-left:4px;letter-spacing:0}
  .shop-col .qty{font-family:"JetBrains Mono",monospace;font-size:10px;text-align:right;color:var(--ink-2);letter-spacing:0.04em}
  .shop-col .sub-head{font-family:"JetBrains Mono",monospace;font-size:8.5px;letter-spacing:0.2em;text-transform:uppercase;color:var(--green);margin:10px 0 4px;padding-bottom:2px;border-bottom:1px solid var(--rule)}
  .shop-col .sub-head:first-child{margin-top:0}
  .shop-note{font-size:11px;color:var(--ink-2);line-height:1.45;margin-top:10px;padding:8px 12px;background:var(--paper-2);border-left:3px solid var(--green)}
  .shop-note b{color:var(--ink)}
  .shop-note + .shop-note{margin-top:6px}
  .shop-page{page-break-inside:avoid}

  /* Harvest cue cards */
  .hv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:18px}
  .hv-card{border:1px solid var(--ink);background:var(--paper);position:relative;display:flex;flex-direction:column}
  .hv-card .hv-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:12px 14px 8px;border-bottom:1px solid var(--ink);background:var(--paper-2)}
  .hv-card .hv-name{font-family:"Fraunces",serif;font-weight:500;font-size:19px;letter-spacing:-0.005em;color:var(--ink);line-height:1.1}
  .hv-card .hv-bed{font-family:"JetBrains Mono",monospace;font-size:8.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-2);white-space:nowrap}
  .hv-card .hv-when{padding:8px 14px 6px;font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:#1f2a20;background:#f2c94c;border-bottom:1px solid var(--ink);display:flex;align-items:center;gap:6px}
  .hv-card .hv-when::before{content:"◆";font-size:8px}
  .hv-card .hv-body{padding:10px 14px 12px;flex:1;display:grid;grid-template-columns:58px 1fr;gap:6px 10px;font-size:12px;line-height:1.45;color:var(--ink)}
  .hv-card .hv-body dt{font-family:"JetBrains Mono",monospace;font-size:8.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-2);padding-top:2px}
  .hv-card .hv-body dd{margin:0;color:var(--ink)}
  .hv-card .hv-body dd b{font-weight:600}
  .hv-card .hv-warn{margin:0;padding:8px 14px 10px;border-top:1px dotted var(--rule);font-size:11.5px;color:#8b4032;line-height:1.4;background:#faf4e4}
  .hv-card .hv-warn::before{content:"⚠ TOO LATE — ";font-family:"JetBrains Mono",monospace;font-size:8.5px;letter-spacing:0.14em;color:#8b4032;font-weight:700}
  .hv-intro{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:22px;padding:16px 0 6px;border-bottom:1px solid var(--rule);margin-bottom:18px}
  .hv-intro h4{font-family:"Fraunces",serif;font-weight:500;font-size:20px;margin:0 0 6px;letter-spacing:-0.005em}
  .hv-intro p{font-size:12.5px;line-height:1.55;color:var(--ink-2);margin:0}
  .hv-intro .rule{font-size:12.5px;line-height:1.55;color:var(--ink-2)}
  .hv-intro .rule b{color:var(--ink);font-weight:600}
  .hv-intro .rule-num{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:0.18em;color:var(--green);display:block;margin-bottom:3px}

  /* On-screen page-break indicators (mirror the @media print rules) */
  @media screen {
    .section-head.page-break{
      position:relative;
      padding-top:48px;
      margin-top:32px;
    }
    .section-head.page-break::before{
      content:"";
      position:absolute;
      top:0;left:-40px;right:-40px;
      height:1px;
      background:repeating-linear-gradient(90deg, var(--ink) 0 6px, transparent 6px 12px);
      opacity:0.35;
    }
    .section-head.page-break::after{
      content:"— page break —";
      position:absolute;
      top:-8px;
      left:50%;
      transform:translateX(-50%);
      background:var(--paper);
      padding:0 12px;
      font-family:"JetBrains Mono",monospace;
      font-size:9px;
      letter-spacing:0.22em;
      text-transform:uppercase;
      color:var(--ink-2);
      opacity:0.55;
    }
  }

  /* Print */
  @media print {

  const s = [];
  s.push(`<svg class="bed-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`);
  // grid
  for (let x = 0; x <= wFt; x++) {
    s.push(`<line class="cell-line" x1="${padL + x*FT}" y1="${padT}" x2="${padL + x*FT}" y2="${padT + h}"/>`);
  }
  for (let y = 0; y <= hFt; y++) {
    s.push(`<line class="cell-line" x1="${padL}" y1="${padT + y*FT}" x2="${padL + w}" y2="${padT + y*FT}"/>`);
  }
  // ruler marks (feet)
  for (let x = 0; x <= wFt; x++) {
    s.push(`<text class="ruler" x="${padL + x*FT}" y="${padT - 6}" text-anchor="middle">${x}</text>`);
  }
  for (let y = 0; y <= hFt; y++) {
    s.push(`<text class="ruler" x="${padL - 6}" y="${padT + y*FT + 2}" text-anchor="end">${y}</text>`);
  }
  // border
  s.push(`<rect class="plot-border" x="${padL}" y="${padT}" width="${w}" height="${h}"/>`);
  // compass mark (top-right)
  s.push(`<g transform="translate(${W - 16}, ${padT + 10})">
    <circle r="8" fill="${COLORS.paper}" stroke="${COLORS.ink}" stroke-width="0.6"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="${COLORS.ink}" stroke-width="0.6"/>
    <text class="compass" y="-9">${compass}</text>
  </g>`);
  return { open: s.join(''), W, H, padL, padT, w, h };
}
function closeSvg() { return '</svg>'; }

// Draw a labeled rectangular zone
function zone(x, y, w, h, color, label, padL, padT) {
  return `
    <rect class="zone-fill" x="${padL + x*FT}" y="${padT + y*FT}" width="${w*FT}" height="${h*FT}" fill="${color}" stroke="${color}"/>
    <text class="plant-label" x="${padL + (x + w/2)*FT}" y="${padT + (y + h/2)*FT + 2}">${label}</text>
  `;
}

// Draw plant dots at ft-coords
function plants(coords, color, r, padL, padT) {
  return coords.map(([x,y]) =>
    `<circle class="plant-dot" cx="${padL + x*FT}" cy="${padT + y*FT}" r="${r}" fill="${color}"/>`
  ).join('');
}

// Add a label centered at ft-coord
function txt(x, y, str, padL, padT, cls='plant-label') {
  return `<text class="${cls}" x="${padL + x*FT}" y="${padT + y*FT + 2}">${str}</text>`;
}

// Grid of plants across a zone
function gridPlants(x0, y0, w, h, cols, rows, color, r, padL, padT) {
  const out = [];
  const dx = w / cols, dy = h / rows;
  for (let c = 0; c < cols; c++) {
    for (let rr = 0; rr < rows; rr++) {
      const px = x0 + dx*(c + 0.5);
      const py = y0 + dy*(rr + 0.5);
      out.push(`<circle class="plant-dot" cx="${padL + px*FT}" cy="${padT + py*FT}" r="${r}" fill="${color}"/>`);
    }
  }
  return out.join('');
}

// Trellis marker (dashed line along one edge)
function trellisLine(x1, y1, x2, y2, padL, padT) {
  return `<line class="trellis" x1="${padL + x1*FT}" y1="${padT + y1*FT}" x2="${padL + x2*FT}" y2="${padT + y2*FT}"/>`;
}

// ---------- Per-bed page renderers ----------

// Slot-based succession timeline renderer.
// A "slot" is a physical patch of bed. Multiple crops can occupy the same slot
// sequentially across the season — this renders each as a bar positioned by
// month, with a ▶ handoff arrow between consecutive crops in the same slot.
//
// `slots` is an array of { slot: string, tag: string, crops: [{ name, start, end, color, marks? }] }
//   start/end are month indices 0..8 where 0 = Mar, 8 = Nov. end is exclusive.
//   color is one of c-tom c-och c-g1 c-g2 c-g3 c-g4
//   marks (optional) is an array of { at, label } for inline callouts (at = month idx).
function succession(slots) {
  const MONTHS = ['MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV'];
  let legend = `<div class="succ-legend">
    <span><b>Slot</b> a patch of bed</span>
    <span><span class="lg-arrow">▶</span> one crop pulled, another planted</span>
    <span><span class="lg-dash"></span> gap — nothing planted here</span>
    <span><span class="lg-stack"></span> two crops overlap in time</span>
    <span><span style="display:inline-block;width:14px;height:10px;background:#f2c94c;border:1px solid #1f2a20;vertical-align:-1px;margin-right:4px"></span><b>PICK</b> peak harvest — walk the row every 2–3 days</span>
  </div>`;
  let head = '<div class="succ-head"><span class="sh first">SLOT</span>';
  for (const m of MONTHS) head += `<span class="sh">${m}</span>`;
  head += '<span></span></div>';

  let rows = '';
  for (const s of slots) {
    // Assign each crop to a sublane so overlapping bars don't collide.
    const lanes = []; // array of end-positions per lane
    const assigned = s.crops.map(c => {
      for (let li = 0; li < lanes.length; li++) {
        if (c.start >= lanes[li]) { lanes[li] = c.end; return li; }
      }
      lanes.push(c.end); return lanes.length - 1;
    });
    const twoLane = lanes.length > 1;
    rows += `<div class="succ-row"><div class="succ-slot">${s.slot}<span class="tag">${s.tag}</span></div>`;
    rows += `<div class="succ-track${twoLane ? ' two-lane' : ''}">`;
    rows += '<div class="grid">' + '<span></span>'.repeat(9) + '</div>';
    for (let i = 0; i < s.crops.length; i++) {
      const c = s.crops[i];
      const lane = assigned[i];
      const leftPct = (c.start / 9) * 100;
      const widthPct = ((c.end - c.start) / 9) * 100;
      const span = c.end - c.start;
      const top = twoLane ? (lane === 0 ? 4 : 22) : 8;
      const hasPeak = Array.isArray(c.peak) && c.peak.length === 2;
      let label = c.name;
      if (c.endLabel && span >= 3) label += `<span class="lend">${c.endLabel}</span>`;
      rows += `<div class="succ-bar ${c.color}${hasPeak ? ' has-peak' : ''}" style="left:${leftPct}%;width:calc(${widthPct}% - 2px);top:${top}px">${label}</div>`;
      if (hasPeak) {
        const pStart = Math.max(c.peak[0], c.start);
        const pEnd = Math.min(c.peak[1], c.end);
        if (pEnd > pStart) {
          const pLeft = (pStart / 9) * 100;
          const pWidth = ((pEnd - pStart) / 9) * 100;
          const pSpan = pEnd - pStart;
          const showText = pSpan >= 1.8;
          const pLabel = showText ? 'PICK' : '◆';
          const peakClass = showText ? 'succ-peak with-dot' : 'succ-peak';
          rows += `<div class="${peakClass}" style="left:${pLeft}%;width:calc(${pWidth}% - 2px);top:${top}px">${pLabel}</div>`;
        }
      }
    }
    // arrows only between consecutive non-overlapping crops in the same lane
    for (let li = 0; li < lanes.length; li++) {
      const inLane = s.crops.map((c, i) => ({c, i})).filter(x => assigned[x.i] === li);
      for (let k = 1; k < inLane.length; k++) {
        const prev = inLane[k-1].c, next = inLane[k].c;
        if (next.start >= prev.end) {
          const gap = next.start - prev.end;
          const top = twoLane ? (li === 0 ? 4 : 22) : 8;
          if (gap >= 2) {
            // draw a dashed bridge across the gap with a label if provided
            const leftPct = (prev.end / 9) * 100;
            const widthPct = (gap / 9) * 100;
            const gapLabel = next.gapLabel || '';
            rows += `<div class="succ-gap" style="left:${leftPct}%;width:${widthPct}%;top:${top}px">${gapLabel}</div>`;
          } else {
            const atPct = (prev.end / 9) * 100;
            rows += `<div class="succ-arrow" style="left:${atPct}%;top:${top + 1}px">▶</div>`;
          }
        }
      }
    }
    rows += '</div></div>';
  }
  return `<div class="succ">${legend}${head}${rows}</div>`;
}

// ---------- SITE PLAN ----------
function sitePlan() {
  const W = 760, H = 480;
  const ink = '#1f2a20';
  const grass = '#e5e6c9';
  const grassDark = '#c9cfa3';
  const wood = '#b89a6b';
  const woodDark = '#8a6e44';
  const soil = '#b69773';
  const soilDark = '#8a6a42';
  const soilLight = '#d4bf94';
  const green = '#4a5d3a';
  const ochre = '#b89534';
  const PF = 26; // px per foot

  let s = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;height:auto;background:${grass};border:1px solid ${ink};border-radius:2px">`;

  // Defs: patterns & filters
  s += `<defs>
    <pattern id="lawn" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(12)">
      <rect width="14" height="14" fill="${grass}"/>
      <path d="M 2 10 l 0 -4 M 6 12 l 0 -5 M 10 9 l 0 -4" stroke="${grassDark}" stroke-width="0.6" stroke-linecap="round"/>
    </pattern>
    <pattern id="soil" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="${soilLight}"/>
      <circle cx="2" cy="3" r="0.5" fill="${soilDark}"/>
      <circle cx="7" cy="5" r="0.5" fill="${soilDark}"/>
      <circle cx="4" cy="8" r="0.4" fill="${soilDark}"/>
      <circle cx="9" cy="1.5" r="0.4" fill="${soilDark}"/>
    </pattern>
    <pattern id="fenceH" width="14" height="12" patternUnits="userSpaceOnUse">
      <rect width="14" height="12" fill="${wood}"/>
      <line x1="0" y1="0" x2="14" y2="0" stroke="${woodDark}" stroke-width="0.6"/>
      <line x1="0" y1="6" x2="14" y2="6" stroke="${woodDark}" stroke-width="0.4" opacity="0.5"/>
      <line x1="2" y1="1" x2="2" y2="11" stroke="${woodDark}" stroke-width="0.3" opacity="0.6"/>
      <line x1="8" y1="1" x2="8" y2="11" stroke="${woodDark}" stroke-width="0.3" opacity="0.6"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>`;

  // Lawn base
  s += `<rect width="${W}" height="${H}" fill="url(#lawn)"/>`;

  // Scattered clover/sprig accents
  for (let i = 0; i < 36; i++) {
    const x = 20 + Math.random() * (W - 40);
    const y = 20 + Math.random() * (H - 40);
    s += `<circle cx="${x}" cy="${y}" r="1.2" fill="${green}" opacity="0.18"/>`;
  }

  // Fence along top (fence is the north/south-facing wall user described — photo top)
  const fenceH = 16;
  s += `<rect x="0" y="0" width="${W}" height="${fenceH}" fill="url(#fenceH)" stroke="${ink}" stroke-width="0.8"/>`;
  s += `<line x1="0" y1="${fenceH}" x2="${W}" y2="${fenceH}" stroke="${ink}" stroke-width="1"/>`;
  // soft shadow below fence
  s += `<rect x="0" y="${fenceH}" width="${W}" height="4" fill="${ink}" opacity="0.08"/>`;

  // Fence label
  s += `<text x="32" y="38" font-family="JetBrains Mono,monospace" font-size="9" fill="${ink}" letter-spacing="2" opacity="0.65">FENCE · SOUTH-FACING · RADIANT HEAT</text>`;

  // ---- 4×10 bed (rotated, N–S long axis)
  const b410 = { x: 200, y: 160, w: 4*PF, h: 10*PF };
  // soil shadow
  s += `<rect x="${b410.x+3}" y="${b410.y+4}" width="${b410.w}" height="${b410.h}" fill="${ink}" opacity="0.12" filter="url(#soft)"/>`;
  // wood frame
  s += `<rect x="${b410.x}" y="${b410.y}" width="${b410.w}" height="${b410.h}" fill="${wood}" stroke="${ink}" stroke-width="1.2"/>`;
  // soil inset
  const inset = 7;
  s += `<rect x="${b410.x+inset}" y="${b410.y+inset}" width="${b410.w-inset*2}" height="${b410.h-inset*2}" fill="url(#soil)" stroke="${woodDark}" stroke-width="0.6"/>`;
  // wood grain lines
  for (let i = 0; i < 4; i++) {
    const yy = b410.y + (i+1) * (b410.h/5);
    s += `<line x1="${b410.x+1}" y1="${yy}" x2="${b410.x+inset-1}" y2="${yy}" stroke="${woodDark}" stroke-width="0.5"/>`;
    s += `<line x1="${b410.x+b410.w-inset+1}" y1="${yy}" x2="${b410.x+b410.w-1}" y2="${yy}" stroke="${woodDark}" stroke-width="0.5"/>`;
  }
  // label rotated
  s += `<text transform="translate(${b410.x + b410.w/2}, ${b410.y + b410.h/2 - 20}) rotate(-90)" font-family="Fraunces,serif" font-size="20" font-weight="500" fill="${ink}" text-anchor="middle" letter-spacing="1">4 × 10</text>`;
  s += `<text transform="translate(${b410.x + b410.w/2 + 14}, ${b410.y + b410.h/2 + 18}) rotate(-90)" font-family="JetBrains Mono,monospace" font-size="8.5" fill="${green}" text-anchor="middle" letter-spacing="2" font-style="italic">rotation · 4-sided access</text>`;
  s += `<text transform="translate(${b410.x + b410.w/2 - 14}, ${b410.y + b410.h/2 + 18}) rotate(-90)" font-family="JetBrains Mono,monospace" font-size="7" fill="${ink}" text-anchor="middle" letter-spacing="2" opacity="0.55">BED 01</text>`;

  // dim tick on left of 4×10
  const dimX = b410.x - 16;
  s += `<line x1="${dimX}" y1="${b410.y}" x2="${dimX}" y2="${b410.y + b410.h}" stroke="${ink}" stroke-width="0.6"/>`;
  s += `<line x1="${dimX-3}" y1="${b410.y}" x2="${dimX+3}" y2="${b410.y}" stroke="${ink}" stroke-width="0.6"/>`;
  s += `<line x1="${dimX-3}" y1="${b410.y + b410.h}" x2="${dimX+3}" y2="${b410.y + b410.h}" stroke="${ink}" stroke-width="0.6"/>`;
  s += `<text transform="translate(${dimX-5}, ${b410.y + b410.h/2}) rotate(-90)" font-family="JetBrains Mono,monospace" font-size="8" fill="${ink}" text-anchor="middle" opacity="0.7">10 FT</text>`;
  // dim tick on bottom
  const dimY = b410.y + b410.h + 14;
  s += `<line x1="${b410.x}" y1="${dimY}" x2="${b410.x + b410.w}" y2="${dimY}" stroke="${ink}" stroke-width="0.6"/>`;
  s += `<line x1="${b410.x}" y1="${dimY-3}" x2="${b410.x}" y2="${dimY+3}" stroke="${ink}" stroke-width="0.6"/>`;
  s += `<line x1="${b410.x + b410.w}" y1="${dimY-3}" x2="${b410.x + b410.w}" y2="${dimY+3}" stroke="${ink}" stroke-width="0.6"/>`;
  s += `<text x="${b410.x + b410.w/2}" y="${dimY + 12}" font-family="JetBrains Mono,monospace" font-size="8" fill="${ink}" text-anchor="middle" opacity="0.7">4 FT</text>`;

  // ---- 3×9 bed against fence
  const b39 = { x: b410.x, y: fenceH + 14, w: 9*PF, h: 3*PF };
  s += `<rect x="${b39.x+3}" y="${b39.y+4}" width="${b39.w}" height="${b39.h}" fill="${ink}" opacity="0.12" filter="url(#soft)"/>`;
  s += `<rect x="${b39.x}" y="${b39.y}" width="${b39.w}" height="${b39.h}" fill="${wood}" stroke="${ink}" stroke-width="1.2"/>`;
  s += `<rect x="${b39.x+inset}" y="${b39.y+inset}" width="${b39.w-inset*2}" height="${b39.h-inset*2}" fill="url(#soil)" stroke="${woodDark}" stroke-width="0.6"/>`;
  // wood grain
  for (let i = 1; i < 9; i++) {
    const xx = b39.x + i * (b39.w/9);
    s += `<line x1="${xx}" y1="${b39.y+1}" x2="${xx}" y2="${b39.y+inset-1}" stroke="${woodDark}" stroke-width="0.5"/>`;
    s += `<line x1="${xx}" y1="${b39.y+b39.h-inset+1}" x2="${xx}" y2="${b39.y+b39.h-1}" stroke="${woodDark}" stroke-width="0.5"/>`;
  }
  s += `<text x="${b39.x + b39.w/2 - 60}" y="${b39.y + b39.h/2 + 6}" font-family="Fraunces,serif" font-size="20" font-weight="500" fill="${ink}" text-anchor="middle" letter-spacing="1">3 × 9</text>`;
  s += `<text x="${b39.x + b39.w/2 - 60}" y="${b39.y + b39.h/2 + 22}" font-family="JetBrains Mono,monospace" font-size="8" fill="${green}" text-anchor="middle" letter-spacing="2" font-style="italic">heat &amp; trellis</text>`;
  s += `<text x="${b39.x + b39.w/2 - 60}" y="${b39.y - 6}" font-family="JetBrains Mono,monospace" font-size="7" fill="${ink}" text-anchor="middle" letter-spacing="2" opacity="0.55">BED 02</text>`;
  // dim top (bed width label)
  const dimTopY = b39.y - 20;
  s += `<line x1="${b39.x}" y1="${dimTopY}" x2="${b39.x + b39.w - 90}" y2="${dimTopY}" stroke="${ink}" stroke-width="0.4" opacity="0.5"/>`;
  s += `<text x="${b39.x + (b39.w - 90)/2}" y="${dimTopY - 3}" font-family="JetBrains Mono,monospace" font-size="8" fill="${ink}" text-anchor="middle" opacity="0.6">9 FT</text>`;

  // trellis indicator on fence side of 3×9
  for (let i = 0; i < 10; i++) {
    const tx = b39.x + inset + i * (b39.w - inset*2)/9;
    s += `<line x1="${tx}" y1="${b39.y+inset+1}" x2="${tx}" y2="${b39.y+inset+8}" stroke="${green}" stroke-width="0.5" stroke-dasharray="1.5 1.5" opacity="0.8"/>`;
  }
  s += `<text x="${b39.x + b39.w/2 + 40}" y="${b39.y + inset + 4}" font-family="JetBrains Mono,monospace" font-size="6.5" fill="${green}" text-anchor="middle" letter-spacing="1" opacity="0.9">↑ TRELLIS</text>`;

  // ---- Tomato pots between beds (right of 4×10)
  const potX = b410.x + b410.w + 38;
  const potYs = [b410.y + 24, b410.y + 100, b410.y + 176];
  for (const py of potYs) {
    // shadow
    s += `<ellipse cx="${potX+3}" cy="${py + 22}" rx="22" ry="4" fill="${ink}" opacity="0.18" filter="url(#soft)"/>`;
    // terracotta pot
    s += `<path d="M ${potX-20} ${py-4} L ${potX-16} ${py+18} Q ${potX} ${py+24} ${potX+16} ${py+18} L ${potX+20} ${py-4} Z" fill="${soilDark}" stroke="${ink}" stroke-width="0.9"/>`;
    s += `<ellipse cx="${potX}" cy="${py-4}" rx="20" ry="5" fill="#a87f52" stroke="${ink}" stroke-width="0.9"/>`;
    s += `<ellipse cx="${potX}" cy="${py-4}" rx="16" ry="3.5" fill="#6b4a2b" opacity="0.55"/>`;
    // tomato foliage suggestion
    s += `<circle cx="${potX-6}" cy="${py-10}" r="5" fill="${green}" opacity="0.6"/>`;
    s += `<circle cx="${potX+5}" cy="${py-12}" r="6" fill="${green}" opacity="0.65"/>`;
    s += `<circle cx="${potX}" cy="${py-16}" r="4.5" fill="${green}" opacity="0.55"/>`;
    s += `<circle cx="${potX+3}" cy="${py-8}" r="1.4" fill="#b94a3b"/>`;
    s += `<circle cx="${potX-4}" cy="${py-6}" r="1.2" fill="#c85a43"/>`;
  }
  // pots label
  s += `<text x="${potX + 36}" y="${potYs[1] + 4}" font-family="Fraunces,serif" font-size="11" font-style="italic" fill="${ink}">Tomatoes ×3</text>`;
  s += `<text x="${potX + 36}" y="${potYs[1] + 18}" font-family="JetBrains Mono,monospace" font-size="7.5" fill="${ink}" opacity="0.6" letter-spacing="1.5">IN POTS · 15 GAL</text>`;
  // dashed connector hint between pots
  s += `<line x1="${potX}" y1="${potYs[0]+24}" x2="${potX}" y2="${potYs[2]-4}" stroke="${green}" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>`;

  // ---- 3×3 standing bed — brought in closer to the 4×10
  const b33 = { x: b410.x + b410.w + 120, y: b410.y + b410.h - 3*PF, w: 3*PF, h: 3*PF };
  // legs (standing)
  s += `<rect x="${b33.x - 4}" y="${b33.y + b33.h - 2}" width="4" height="18" fill="${woodDark}"/>`;
  s += `<rect x="${b33.x + b33.w}" y="${b33.y + b33.h - 2}" width="4" height="18" fill="${woodDark}"/>`;
  // shadow
  s += `<rect x="${b33.x+3}" y="${b33.y+5}" width="${b33.w}" height="${b33.h}" fill="${ink}" opacity="0.14" filter="url(#soft)"/>`;
  // frame
  s += `<rect x="${b33.x}" y="${b33.y}" width="${b33.w}" height="${b33.h}" fill="${wood}" stroke="${ink}" stroke-width="1.2"/>`;
  s += `<rect x="${b33.x+inset}" y="${b33.y+inset}" width="${b33.w-inset*2}" height="${b33.h-inset*2}" fill="url(#soil)" stroke="${woodDark}" stroke-width="0.6"/>`;
  // internal cross (4 quadrants suggestion)
  s += `<line x1="${b33.x + b33.w/2}" y1="${b33.y+inset+2}" x2="${b33.x + b33.w/2}" y2="${b33.y+b33.h-inset-2}" stroke="${woodDark}" stroke-width="0.4" stroke-dasharray="2 2" opacity="0.5"/>`;
  s += `<line x1="${b33.x+inset+2}" y1="${b33.y + b33.h/2}" x2="${b33.x+b33.w-inset-2}" y2="${b33.y + b33.h/2}" stroke="${woodDark}" stroke-width="0.4" stroke-dasharray="2 2" opacity="0.5"/>`;
  // herb dots
  const herbPos = [[0.3,0.3],[0.7,0.3],[0.3,0.7],[0.7,0.7]];
  for (const [fx,fy] of herbPos) {
    s += `<circle cx="${b33.x + fx*b33.w}" cy="${b33.y + fy*b33.h}" r="4" fill="${green}" opacity="0.55"/>`;
  }
  s += `<text x="${b33.x + b33.w/2}" y="${b33.y - 10}" font-family="Fraunces,serif" font-size="15" font-weight="500" fill="${ink}" text-anchor="middle">3 × 3</text>`;
  s += `<text x="${b33.x + b33.w/2}" y="${b33.y + b33.h + 30}" font-family="JetBrains Mono,monospace" font-size="8" fill="${green}" text-anchor="middle" letter-spacing="1.5" font-style="italic">standing herbs</text>`;
  s += `<text x="${b33.x + b33.w/2}" y="${b33.y + b33.h + 44}" font-family="JetBrains Mono,monospace" font-size="7" fill="${ink}" text-anchor="middle" letter-spacing="2" opacity="0.55">BED 03 · KITCHEN SIDE</text>`;

  // ---- Compass rose
  const compX = 60, compY = H - 60;
  s += `<circle cx="${compX}" cy="${compY}" r="26" fill="${grass}" stroke="${ink}" stroke-width="0.7"/>`;
  s += `<circle cx="${compX}" cy="${compY}" r="20" fill="none" stroke="${ink}" stroke-width="0.3" opacity="0.5"/>`;
  // North is UP: dark arrow-half points up toward N
  s += `<polygon points="${compX},${compY-22} ${compX+5},${compY} ${compX},${compY+22} ${compX-5},${compY}" fill="${grass}" stroke="${ink}" stroke-width="0.6"/>`;
  s += `<polygon points="${compX},${compY-22} ${compX+5},${compY} ${compX-5},${compY}" fill="${ink}"/>`;
  s += `<line x1="${compX-22}" y1="${compY}" x2="${compX+22}" y2="${compY}" stroke="${ink}" stroke-width="0.4" opacity="0.5"/>`;
  s += `<text x="${compX}" y="${compY-28}" font-family="Fraunces,serif" font-size="11" font-style="italic" fill="${ink}" text-anchor="middle">N</text>`;
  s += `<text x="${compX+32}" y="${compY+3}" font-family="JetBrains Mono,monospace" font-size="7" fill="${ink}" opacity="0.6">E</text>`;
  s += `<text x="${compX-32}" y="${compY+3}" font-family="JetBrains Mono,monospace" font-size="7" fill="${ink}" text-anchor="end" opacity="0.6">W</text>`;
  s += `<text x="${compX}" y="${compY+32}" font-family="JetBrains Mono,monospace" font-size="7" fill="${ink}" text-anchor="middle" opacity="0.6">S</text>`;

  // ---- Sun arc — arcs across the BOTTOM of the plan (the lit side of the yard).
  // Sunrise east = LEFT, sunset west = RIGHT.
  s += `<path d="M 140 ${H-90} Q 400 ${H-10} 660 ${H-90}" fill="none" stroke="${ochre}" stroke-width="1" stroke-dasharray="3 4" opacity="0.75"/>`;
  s += `<circle cx="140" cy="${H-90}" r="3" fill="${ochre}" opacity="0.6"/>`;
  s += `<circle cx="400" cy="${H-24}" r="5" fill="${ochre}"/>`;
  s += `<circle cx="660" cy="${H-90}" r="3" fill="${ochre}" opacity="0.6"/>`;
  s += `<text x="150" y="${H-96}" font-family="JetBrains Mono,monospace" font-size="7" fill="${ochre}" letter-spacing="1.5">W · SET</text>`;
  s += `<text x="650" y="${H-96}" font-family="JetBrains Mono,monospace" font-size="7" fill="${ochre}" text-anchor="end" letter-spacing="1.5">RISE · E</text>`;
  s += `<text x="400" y="${H-30}" font-family="Fraunces,serif" font-size="10" font-style="italic" fill="${ochre}" text-anchor="middle">☼ sun arc</text>`;

  // ---- Scale bar
  const sbX = 180, sbY = H - 32;
  s += `<line x1="${sbX}" y1="${sbY}" x2="${sbX + 5*PF}" y2="${sbY}" stroke="${ink}" stroke-width="1"/>`;
  for (let i = 0; i <= 5; i++) {
    s += `<line x1="${sbX + i*PF}" y1="${sbY-3}" x2="${sbX + i*PF}" y2="${sbY+3}" stroke="${ink}" stroke-width="1"/>`;
  }
  s += `<text x="${sbX}" y="${sbY + 14}" font-family="JetBrains Mono,monospace" font-size="7" fill="${ink}" opacity="0.7">0</text>`;
  s += `<text x="${sbX + 5*PF}" y="${sbY + 14}" font-family="JetBrains Mono,monospace" font-size="7" fill="${ink}" opacity="0.7" text-anchor="end">5 FT</text>`;
  s += `<text x="${sbX + 2.5*PF}" y="${sbY - 6}" font-family="JetBrains Mono,monospace" font-size="7" fill="${ink}" opacity="0.6" text-anchor="middle" letter-spacing="1.5">SCALE</text>`;

  // Title cartouche (bottom-left of plan)
  s += `<g transform="translate(${W-280}, 60)">
    <rect x="0" y="0" width="220" height="52" fill="${grass}" stroke="${ink}" stroke-width="0.5" opacity="0.9"/>
    <text x="12" y="18" font-family="JetBrains Mono,monospace" font-size="8" fill="${ink}" letter-spacing="2" opacity="0.65">PLATE I · SITE PLAN</text>
    <text x="12" y="36" font-family="Fraunces,serif" font-size="14" font-style="italic" fill="${ink}">The yard as drawn</text>
    <text x="12" y="48" font-family="JetBrains Mono,monospace" font-size="7" fill="${green}" letter-spacing="1.5">1 FT = 26 PX · APR 2026</text>
  </g>`;

  s += `</svg>`;
  return s;
}





window.GardenPlan = {
  sitePlan, sitePlanAside,
  bed4x10_A, bed3x9_A, bed3x3_A,
  bedCard, notesA,
  bedPage_410, bedPage_39, bedPage_33, bedPage_pots,
  shoppingList, harvestCues, succession
};

</script>
<script>
/* Site chrome: injects sidebar + top tabs around page content.
 * Usage on each page:
 *   <body class="site" data-tab="overview|bed-4x10|bed-3x9|bed-3x3|pots|harvest|shopping"
 *         data-season="spring-2026">
 *     <main class="site-main"> ... page content ... </main>
 *     <script src="garden-data.js"><\/script>
 *     <script src="site-chrome.js"><\/script>
 */

(function(){
  const tabs = [
    { key:'overview',  href:'index.html',      num:'§ 00', label:'Overview' },
    { key:'bed-4x10',  href:'bed-4x10.html',   num:'§ 03', label:'4 × 10 bed' },
    { key:'bed-3x9',   href:'bed-3x9.html',    num:'§ 04', label:'3 × 9 bed' },
    { key:'bed-3x3',   href:'bed-3x3.html',    num:'§ 05', label:'3 × 3 herbs' },
    { key:'pots',      href:'pots.html',       num:'§ 06', label:'Tomato pots' },
    { key:'harvest',   href:'harvest.html',    num:'§ 07', label:'Harvest cues' },
    { key:'shopping',  href:'shopping.html',   num:'§ 08', label:'Shopping list' },
  ];

  const seasons = [
    { key:'spring-2026', label:'Spring / Summer', sub:'2026', active:true },
  ];

  const body = document.body;
  const activeTab = body.dataset.tab || 'overview';
  const activeSeason = body.dataset.season || 'spring-2026';

  // Pull any <main class="site-main"> the page already has and preserve it
  let mainEl = body.querySelector('main.site-main');
  if (!mainEl) {
    // Wrap whatever is in body into a main
    mainEl = document.createElement('main');
    mainEl.className = 'site-main';
    while (body.firstChild) mainEl.appendChild(body.firstChild);
  } else {
    mainEl.remove(); // we'll re-insert into shell
  }

  // Build shell
  const shell = document.createElement('div');
  shell.className = 'site-shell';
  // restore collapsed state from localStorage
  if (localStorage.getItem('garden.sideCollapsed') === '1') shell.classList.add('sidebar-collapsed');

  // Sidebar
  const side = document.createElement('aside');
  side.className = 'site-side';
  side.innerHTML = `
    <div class="side-top">
      <div class="side-logo" aria-hidden="true"></div>
      <div class="brand">Bothell<br><em>garden plan</em></div>
      <button class="side-toggle" type="button" aria-label="Collapse sidebar">‹</button>
    </div>
    <div class="side-section-title">Growing seasons</div>
    <div class="side-section">
      ${seasons.map(s => `
        <a class="side-link ${s.active && s.key===activeSeason ? 'active' : ''} ${s.disabled ? 'disabled' : ''}"
           href="${s.disabled ? 'javascript:void(0)' : 'index.html'}">
          <span class="dot"></span>
          <span class="side-link-text">
            ${s.label}
            <em>${s.sub}</em>
          </span>
        </a>
      `).join('')}
    </div>
    <div class="side-foot">
      Bothell, WA · 98012<br>
      Zone 8b · Revision 01
    </div>
  `;

  // Top bar
  const top = document.createElement('div');
  top.className = 'site-top';
  top.innerHTML = `
    <button class="mobile-menu-btn" type="button" aria-label="Open menu">☰</button>
    <nav class="site-tabs">
      ${tabs.map(t => `
        <a class="site-tab ${t.key===activeTab ? 'active' : ''}" href="${t.href}">
          <span class="tab-num">${t.num}</span>
          <span>${t.label}</span>
        </a>
      `).join('')}
    </nav>
    <div class="site-top-right">
      <span class="loc">Lat <b>47.8°N</b> · Zone <b>8b</b></span>
    </div>
  `;

  // Backdrop for mobile sidebar
  const backdrop = document.createElement('div');
  backdrop.className = 'site-backdrop';

  shell.appendChild(side);
  shell.appendChild(top);
  shell.appendChild(mainEl);
  shell.appendChild(backdrop);

  body.appendChild(shell);

  // Sidebar collapse
  const toggleBtn = side.querySelector('.side-toggle');
  toggleBtn.addEventListener('click', () => {
    shell.classList.toggle('sidebar-collapsed');
    const collapsed = shell.classList.contains('sidebar-collapsed');
    localStorage.setItem('garden.sideCollapsed', collapsed ? '1' : '0');
    toggleBtn.textContent = collapsed ? '›' : '‹';
  });
  toggleBtn.textContent = shell.classList.contains('sidebar-collapsed') ? '›' : '‹';

  // Mobile menu
  const menuBtn = top.querySelector('.mobile-menu-btn');
  menuBtn.addEventListener('click', () => shell.classList.add('mobile-open'));
  backdrop.addEventListener('click', () => shell.classList.remove('mobile-open'));

  // Scroll active tab into view on mobile
  const activeTabEl = top.querySelector('.site-tab.active');
  if (activeTabEl) activeTabEl.scrollIntoView({inline:'center', block:'nearest', behavior:'instant'});
})();

</script>
<script>
  if (window.__mount) window.__mount();
</script>
